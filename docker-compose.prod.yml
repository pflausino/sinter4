services:
  api:
    container_name: sinter-prints-api
    build:
      context: .
      dockerfile: Dockerfile.Api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=sinterdb;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Firebase__ServiceAccountPath: /run/secrets/firebase-service-account.json
      Firebase__ProjectId: sinter-prints-3
    volumes:
      - ./secrets/firebase/service-account.json:/run/secrets/firebase-service-account.json:ro
    networks:
      - proxy
      - internal

  web:
    container_name: sinter-prints-web
    build:
      context: .
      dockerfile: Dockerfile.Web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    depends_on:
      - api
    networks:
      - proxy

networks:
  proxy:
    external: true
  internal:
    external: true