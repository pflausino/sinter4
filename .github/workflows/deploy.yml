name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Test
        run: dotnet test --no-build --verbosity normal

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Copy project files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: pflausino.xyz
          username: pflausino
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "src/,docker-compose.prod.yml,Dockerfile.Api,Dockerfile.Web,.dockerignore"
          target: "/opt/apps/sinter-prints"

      - name: Build and deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: pflausino.xyz
          username: pflausino
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script: |
            cd /opt/apps/sinter-prints
            docker compose -f docker-compose.prod.yml build
            docker compose -f docker-compose.prod.yml up -d --force-recreate --remove-orphans
            docker image prune -f

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: pflausino.xyz
          username: pflausino
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sleep 5
            docker exec sinter-prints-api wget -qO- http://localhost:8080/health || exit 1
            docker exec sinter-prints-web wget -qO- http://localhost:8080/_framework/blazor.web.js > /dev/null || exit 1
            echo "Deployment verified successfully"
